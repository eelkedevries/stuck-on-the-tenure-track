# Layer-2 (psychology) events (specification §2, §7; prompts 066, 086, 092, 093).
# Each choice is a simple dilemma: usually one upside and one downside, shown to
# the player before they choose. No option dominates its alternative.
meta:
  id: psychology
  name: Psychology
  layer: discipline
events:
  # --- Student stages (undergraduate / MSc) ------------------------------
  - event_id: exam_week
    title: Exam week
    body: >-
      Three exams, four days, and a reading list you have been intending to
      start since October.
    conditions: { stages: [undergraduate, msc] }
    tags: [study]
    choices:
      - label: Cram all night
        result: You scrape through, sharper but wrecked.
        effects: { theory: 3, sleep: -10 }
      - label: Revise sensibly and sleep
        result: Rested, but you covered less than you meant to.
        effects: { sleep: 8, theory: -1 }

  - event_id: group_project
    title: The group project
    body: >-
      Five names on the coversheet, two people doing the work, and one who has
      "been really busy".
    conditions: { stages: [undergraduate] }
    tags: [study, networking]
    choices:
      - label: Do it all yourself
        result: A good mark, and a lost weekend.
        effects: { methods: 3, mood: -5 }
      - label: Make everyone contribute
        result: You learn to chair a room; the work is a little rougher.
        effects: { politics: 2, methods: -1 }

  - event_id: freshers_temptation
    title: A night out beckons
    body: >-
      Your housemates are going out. There is also a problem set due at nine.
    conditions: { stages: [undergraduate] }
    tags: [personal]
    choices:
      - label: Go out
        result: A wonderful night; a heavy morning.
        effects: { mood: 8, sleep: -8 }
      - label: Stay in and study
        result: Quietly ahead, and a little flat.
        effects: { theory: 3, mood: -3 }

  - event_id: first_supervision
    title: Meeting your supervisor
    body: >-
      Half an hour with someone whose time is, you are repeatedly reminded,
      extremely valuable.
    conditions: { stages: [undergraduate, msc] }
    tags: [networking]
    choices:
      - label: Turn up well prepared
        result: They are impressed — you were up half the night for it.
        effects: { reputation: 3, sleep: -6 }
      - label: Wing it
        result: Rested, but they were not fooled.
        effects: { mood: 3, reputation: -2 }

  - event_id: lecture_question
    title: A question forms
    body: >-
      You think the lecturer has just contradicted last week's slides. So, it
      seems, does no one else.
    conditions: { stages: [undergraduate, msc] }
    tags: [study]
    choices:
      - label: Put your hand up
        result: You were right. The room notices — and so does your pulse.
        effects: { reputation: 2, stress: 6 }
      - label: Keep quiet
        result: Comfortable, and invisible.
        effects: { stress: -3, reputation: -1 }

  - event_id: thesis_topic
    title: Choosing an MSc thesis topic
    body: >-
      A safe project that will certainly work, or an interesting one that
      certainly might not.
    conditions: { stages: [msc] }
    tags: [study, research]
    choices:
      - label: Play it safe
        result: It works, and impresses no one.
        effects: { methods: 2, reputation: -1 }
      - label: Be ambitious
        result: People are watching — and you are not sleeping.
        effects: { reputation: 3, stress: 8 }

  - event_id: stats_course
    title: The dreaded stats module
    body: >-
      Mixed-effects models, and the dawning realisation that you will be doing
      this forever.
    conditions: { stages: [msc] }
    tags: [study]
    choices:
      - label: Put in the hours
        result: It clicks, at the cost of your evenings.
        effects: { statistics: 3, sleep: -6 }
      - label: Learn just enough to pass
        result: Lighter now; shakier later.
        effects: { mood: 3, statistics: -1 }

  # --- Research career (PhD onward) ---------------------------------------
  - event_id: replication_failure
    title: A replication fails
    body: >-
      A registered replication of your best-known finding reports a null
      result. The first authors are scrupulously polite about it.
    conditions: { stages: [phd, postdoc, assistant_professor] }
    tags: [research, reputation]
    choices:
      - label: Engage graciously
        result: Honest and respected; it still stings.
        effects: { reputation: 3, mood: -3 }
      - label: Defend the original
        result: You save face; the doubters multiply.
        effects: { mood: 2, reputation: -3 }

  - event_id: reviewer_two
    title: Reviewer 2 returns
    body: >-
      Two reviewers want minor revisions. The third would like a different
      study, with their own work cited four more times.
    conditions: { stages: [phd, postdoc, assistant_professor] }
    tags: [publishing]
    choices:
      - label: Revise dutifully
        result: Accepted — and a small piece of your soul with it.
        effects: { writing: 2, mood: -3 }
      - label: Push back in the response letter
        result: A bold rebuttal that might win, or might sink the paper.
        effects: { reputation: 2, stress: 5 }

  - event_id: methods_dispute
    title: A methods dispute
    body: >-
      A commentary questions your analysis pipeline, with the icy courtesy
      psychologists reserve for people they think are wrong.
    conditions: { stages: [phd, postdoc, assistant_professor] }
    tags: [research, methods]
    choices:
      - label: Reanalyse openly
        result: Rigorous, and exhausting.
        effects: { methods: 3, stress: 5 }
      - label: Let it pass
        result: You keep your evening; the commentary keeps circulating.
        effects: { mood: 2, reputation: -2 }

  - event_id: ethics_review
    title: The ethics committee has notes
    body: >-
      Your application is returned. The committee is untroubled by the design
      but deeply concerned about the wording of the debrief leaflet.
    conditions: { stages: [phd, postdoc, assistant_professor] }
    tags: [research, admin]
    choices:
      - label: Revise and resubmit
        result: Thorough, and another fortnight gone.
        effects: { reputation: 2, mood: -2 }
      - label: Request a meeting
        result: You make your case in person; some find it pushy.
        effects: { politics: 2, reputation: -1 }

  - event_id: grant_rejection
    title: The panel "could not fund everything"
    body: >-
      Scored in the top fifteen per cent, funded in the top eight. They invite
      you to resubmit next year.
    conditions: { stages: [postdoc, assistant_professor] }
    tags: [grants, funding]
    choices:
      - label: Resubmit, stronger
        result: Grimly determined — there go the weekends.
        effects: { writing: 2, stress: 6 }
      - label: Let this one go
        result: Relief now; an opportunity gone.
        effects: { mood: 4, reputation: -2 }

  - event_id: predatory_invite
    title: An "esteemed" invitation
    body: >-
      A journal you have never heard of, with an impact factor it appears to
      have invented, invites you to submit within ten days.
    conditions: { stages: [phd, postdoc, assistant_professor] }
    tags: [publishing]
    choices:
      - label: Delete it and move on
        result: A small, clean satisfaction.
        effects: { mood: 1 }
      - label: Warn your colleagues publicly
        result: Useful and principled; a few find you preachy.
        effects: { reputation: 2, stress: 3 }

  - event_id: teaching_overload
    title: A module lands on your desk
    body: >-
      A colleague's sabbatical leaves a 200-student module without a convener.
      A wonderful opportunity, everyone agrees, for your development.
    conditions: { stages: [assistant_professor] }
    tags: [teaching, workload]
    choices:
      - label: Take it on
        result: The students like you; your sleep does not.
        effects: { teaching: 3, sleep: -6 }
      - label: Decline, politely
        result: You hold the line; the corridor remembers.
        effects: { mood: 3, reputation: -3 }

  - event_id: coauthorship_dispute
    title: An authorship conversation
    body: >-
      A collaborator feels their contribution merits second authorship. You
      feel it merits an acknowledgement.
    conditions: { stages: [phd, postdoc, assistant_professor] }
    tags: [research]
    choices:
      - label: Give them second
        result: A friendship kept, a line on your CV softened.
        effects: { mood: 2, reputation: -2 }
      - label: Hold your ground
        result: You win the point and lose some goodwill.
        effects: { reputation: 2, mood: -3 }

  - event_id: press_overreach
    title: The press office improves your findings
    body: >-
      The release announces your modest effect "could transform" something it
      plainly cannot. A journalist would like a quote by four.
    conditions: { stages: [phd, postdoc, assistant_professor] }
    tags: [reputation, media]
    choices:
      - label: Correct the record
        result: Respected by the people who matter; the splash is gone.
        effects: { reputation: 2, affiliation_prestige: -2 }
      - label: Enjoy the attention
        result: The institution is delighted; your methods friends are not.
        effects: { affiliation_prestige: 3, reputation: -2 }

  - event_id: viva_scheduled
    title: The viva is scheduled
    body: >-
      A date, an external with strong views on your second chapter, and a
      corridor of people asking if you feel ready.
    conditions: { stages: [phd] }
    tags: [milestone]
    choices:
      - label: Prepare relentlessly
        result: You will know it cold — and pay for it in sleep.
        effects: { reputation: 3, sleep: -6 }
      - label: Trust the work
        result: Rested and calm, and rolling the dice a little.
        effects: { mood: 3, reputation: -1 }

  # --- Variance pass (prompt 110): more per-stage dilemmas -----------------
  - event_id: flatmate_crisis
    title: The 2 a.m. flatmate
    body: >-
      A knock. Your flatmate, holding tea, radiating heartbreak. You have a
      nine o'clock.
    conditions: { stages: [undergraduate] }
    tags: [personal]
    choices:
      - label: Stay up and listen
        result: You are a good person and a tired one.
        effects: { mood: 3, sleep: -7 }
      - label: Offer tomorrow, kindly
        result: Boundaries set; guilt scheduled for breakfast.
        effects: { sleep: 4, mood: -2 }
  - event_id: textbook_price
    title: The £60 textbook
    body: >-
      The module guide calls it essential. The lecturer wrote it. The library
      owns two copies, both recalled until June.
    conditions: { stages: [undergraduate, msc] }
    tags: [study, money]
    choices:
      - label: Buy it new
        result: Knowledge acquired, beans for dinner.
        effects: { personal_funds: -60, theory: 2 }
      - label: Hunt a dog-eared second-hand copy
        result: Cheaper, with someone else's confident wrong annotations.
        effects: { personal_funds: -20, theory: 1, stress: 1 }
  - event_id: course_rep
    title: Be the course rep?
    body: >-
      Nobody else has volunteered. The staff-student committee has biscuits
      and minutes, in that order of importance.
    conditions: { stages: [undergraduate] }
    tags: [politics]
    choices:
      - label: Volunteer
        result: You learn how the department actually works. Useful, forever.
        effects: { politics: 3, stress: 2 }
      - label: Keep your head down
        result: A quieter term for you; a quieter cohort for everyone.
        effects: { mood: 1 }
  - event_id: deadline_clash
    title: Two deadlines, one Friday
    body: >-
      The stats assignment and the essay are due four hours apart, set by
      lecturers who clearly do not speak to one another.
    conditions: { stages: [undergraduate, msc] }
    tags: [study]
    choices:
      - label: All-nighter, both in on time
        result: Heroic, technically. Your eyelids disagree.
        effects: { statistics: 2, writing: 1, sleep: -9 }
      - label: Ask for an extension
        result: Granted, with a pause you will remember unprompted for years.
        effects: { sleep: 2, stress: -2, reputation: -1 }
  - event_id: msc_imposter_evening
    title: Everyone here seems brilliant
    body: >-
      The cohort WhatsApp is a wall of finished drafts and fellowship plans.
      You have a sandwich and doubts.
    conditions: { stages: [msc] }
    tags: [personal]
    choices:
      - label: Say it out loud to a coursemate
        result: They feel exactly the same. The relief is chemical.
        effects: { mood: 5, stress: -4 }
      - label: Work later to compensate
        result: The draft grows; so does the doubt.
        effects: { writing: 2, mood: -3, sleep: -3 }
  - event_id: thesis_backup
    title: The backup that wasn't
    body: >-
      The USB stick with the thesis data is in a washing machine, mid-cycle.
      The cloud sync was "going to be set up this weekend".
    conditions: { stages: [msc] }
    tags: [study]
    choices:
      - label: Recreate the lost week
        result: Painful, thorough, and now triple-backed-up.
        effects: { methods: 2, stress: 6 }
      - label: Trim the analysis plan
        result: Leaner thesis, lighter conscience, lingering what-if.
        effects: { stress: 1, writing: -1 }
  - event_id: participant_pool_dry
    title: The participant pool runs dry
    body: >-
      Week nine: every undergraduate who wants course credit has been tested,
      twice. Your study needs forty more.
    conditions: { stages: [phd] }
    tags: [research]
    choices:
      - label: Pay participants from your own pocket
        result: Data flows; lunches become theoretical.
        effects: { personal_funds: -80, methods: 2 }
      - label: Extend the study into next term
        result: The timeline slips. Timelines do that.
        effects: { stress: 3, mood: -1 }
  - event_id: preprint_scooped
    title: Scooped, almost
    body: >-
      A preprint appears doing nearly your study, nearly your way, from a lab
      with nearly infinite funding.
    conditions: { stages: [phd, postdoc] }
    tags: [publishing, research]
    choices:
      - label: Race to submit first
        result: Submitted in a fortnight of adrenaline and instant noodles.
        effects: { writing: 3, sleep: -8, stress: 4 }
      - label: Slow down and differentiate
        result: A better paper, later, calmer.
        effects: { methods: 2, theory: 1, stress: 1 }
  - event_id: teaching_vs_data
    title: Tutorial or testing slot?
    body: >-
      Your tutorial group needs you at two; the eye-tracker is free at two.
      Both bookings have your name on them.
    conditions: { stages: [phd] }
    tags: [teaching, research]
    choices:
      - label: Teach, reschedule the lab
        result: The students get their money's worth; the study waits a week.
        effects: { teaching: 2, stress: 2 }
      - label: Swap the tutorial with a colleague
        result: The data lands. You now owe a favour with interest.
        effects: { methods: 2, politics: -1 }
  - event_id: open_data_request
    title: A request for your data
    body: >-
      A stranger emails asking for the dataset behind your last paper,
      "for a replication". Their tone is 60% curiosity, 40% audit.
    conditions: { stages: [phd, postdoc, assistant_professor] }
    tags: [publishing, open_science]
    choices:
      - label: Share everything, tidied
        result: Two days of cleaning scripts; a reputation for openness.
        effects: { reputation: 2, stress: 2 }
      - label: Stall politely
        result: The email thread grows teeth. Openness, delayed, sours.
        effects: { politics: 1, reputation: -2 }
  - event_id: student_in_tears
    title: A student in your office
    body: >-
      Your tutee arrives mid-collapse: family, money, deadlines, all at once.
      The next meeting is in ten minutes.
    conditions: { stages: [assistant_professor] }
    tags: [teaching, personal]
    choices:
      - label: Cancel the next thing and listen
        result: You were the right person at the right time. It cost a meeting.
        effects: { reputation: 1, mood: 2, stress: 2 }
      - label: Refer them to student services
        result: Correct procedure, faint aftertaste.
        effects: { stress: -1, mood: -2 }
  - event_id: budget_cut
    title: The funder trims your budget
    body: >-
      "We are pleased to fund your project at 80% of the requested level."
      The work, of course, remains at 100%.
    conditions: { stages: [postdoc, assistant_professor] }
    tags: [funding, money]
    choices:
      - label: Absorb it and push on
        result: The spreadsheet bleeds quietly into the evenings.
        effects: { stress: 4, politics: 1 }
      - label: Descope the project openly
        result: Honest, defensible, and noted by the panel.
        effects: { stress: 1, reputation: -1 }
  - event_id: external_examiner
    title: External examiner invitation
    body: >-
      Another university would like your judgement, twice a year, for a fee
      that almost covers the train.
    conditions: { stages: [assistant_professor] }
    tags: [service, money]
    choices:
      - label: Accept the role
        result: Status, spreadsheets, and £150 a visit.
        effects: { personal_funds: 150, politics: 2, stress: 3 }
      - label: Decline this cycle
        result: Your weekends remain your own, for now.
        effects: { mood: 2 }
  - event_id: lab_dog
    title: A dog visits the department
    body: >-
      Someone's collie is doing the rounds of the corridor, conducting an
      informal wellbeing audit. Productivity halts entirely.
    tags: [personal]
    choices:
      - label: Take your turn with the dog
        result: Ten minutes of unconditional approval. Science can wait.
        effects: { mood: 4, stress: -3 }
      - label: Close the office door
        result: The work continues. Through the door, a single bark of judgement.
        effects: { writing: 1, mood: -2 }
