# Layer-3 (social) events (specification §2, §7; prompts 068, 086, 093). The
# first overrides the psychology Layer-2 `methods_dispute`; the rest are
# social-only. Each choice is a simple dilemma.
meta:
  id: social
  name: Social psychology
  layer: sub-discipline
  parent: psychology
events:
  - event_id: methods_dispute
    title: A methods dispute breaks out
    body: >-
      A blog post takes apart your moderation analysis and your covariates. By
      lunchtime it has a hashtag; by Friday, a special issue.
    conditions: { stages: [phd, postdoc, assistant_professor] }
    tags: [research, methods, reputation, social]
    choices:
      - label: Post your data and code
        result: Transparency disarms most of it — at a price in nerves.
        effects: { reputation: 3, stress: 5 }
      - label: Mute the thread
        result: It rumbles on without you, which is its own verdict.
        effects: { mood: 2, reputation: -3 }

  - event_id: priming_effect_evaporates
    title: A classic effect evaporates
    body: >-
      A large, preregistered study finds your textbook social-priming effect is,
      at best, a rounding error. The textbook has already gone to print.
    conditions: { stages: [phd, postdoc, assistant_professor] }
    tags: [research, reputation, social]
    choices:
      - label: Pivot your programme
        result: Wise, if humbling.
        effects: { methods: 2, mood: -3 }
      - label: Hold the line
        result: You insist the moderators matter; fewer agree each year.
        effects: { mood: 1, reputation: -3 }

  - event_id: scale_validation_request
    title: Reviewers want the scale validated
    body: >-
      Your nine-item measure works beautifully. The reviewers would simply like
      a separate paper establishing that, ideally before this one.
    conditions: { stages: [phd, postdoc, assistant_professor] }
    tags: [research, methods, social]
    choices:
      - label: Run the validation study
        result: Thorough, and another month gone.
        effects: { statistics: 3, sleep: -6 }
      - label: Cite an existing scale instead
        result: Faster; it never quite measures what you meant.
        effects: { mood: 2, methods: -2 }
